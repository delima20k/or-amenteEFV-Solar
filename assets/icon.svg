<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Fundo quadrado com cantos arredondados -->
  <rect width="512" height="512" rx="80" ry="80" fill="#111827"/>

  <!-- Acento dourado no topo -->
  <rect x="0" y="0" width="512" height="8" rx="4" fill="#FFB800"/>

  <!-- Halo do sol ao fundo -->
  <circle cx="390" cy="110" r="80" fill="none" stroke="#FFB800" stroke-width="2" opacity="0.18"/>
  <circle cx="390" cy="110" r="55" fill="#FFB800" opacity="0.08"/>

  <!-- Letras EFV: EF em ciano, V em dourado -->
  <text x="256" y="296"
        font-family="Arial Black, Arial, sans-serif"
        font-size="220"
        font-weight="900"
        text-anchor="middle"
        letter-spacing="-6"
        fill="none">
    <tspan fill="#00B4D8">EF</tspan><tspan fill="#FFB800">V</tspan>
  </text>

  <!-- SOLAR abaixo -->
  <text x="256" y="380"
        font-family="Arial, sans-serif"
        font-size="72"
        font-weight="700"
        text-anchor="middle"
        letter-spacing="20"
        fill="#FFB800"
        opacity="0.9">SOLAR</text>

  <!-- Linha separadora dourada embaixo de SOLAR -->
  <rect x="96" y="400" width="320" height="4" rx="2" fill="#FFB800" opacity="0.5"/>

  <!-- Raios do sol (canto superior direito) -->
  <g stroke="#FFB800" stroke-width="2" opacity="0.25" stroke-linecap="round">
    <line x1="390" y1="45" x2="390" y2="20"/>
    <line x1="430" y1="70" x2="450" y2="52"/>
    <line x1="455" y1="110" x2="480" y2="110"/>
    <line x1="430" y1="150" x2="450" y2="168"/>
    <line x1="350" y1="70" x2="330" y2="52"/>
  </g>
</svg>
